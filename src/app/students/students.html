<div class="container">
  <mat-card>
    <mat-card-header>
      <mat-card-title>Students title</mat-card-title>
    </mat-card-header>
    <mat-divider></mat-divider>
    <mat-card-content>
      <!-- research -->
      <mat-form-field appearance="outline">
        <mat-label>Filter</mat-label>
        <input matInput (change)="filterStudents($event)">
      </mat-form-field>
      <mat-toolbar>
      <button (click)="newStudent()" mat-raised-button color="primary">
        New Student
      </button>
      </mat-toolbar>
      <table matSort mat-table [dataSource]="studentDataSource" class="mat-elevation-z1">

        <ng-container matColumnDef="id">
          <th mat-header-cell *matHeaderCellDef mat-sort-header> ID </th>
          <td mat-cell *matCellDef="let element"> {{element.id}} </td>
        </ng-container>

        <ng-container matColumnDef="photo">
          <th *matHeaderCellDef mat-header-cell>Photo</th>
          <td *matCellDef="let element" mat-cell>
            <img
              [src]="backendHost + '/students/' + element.id + '/photo'"
              (error)="onImageError($event)"
              alt="student photo"
              class="student-avatar"
            />
          </td>
        </ng-container>

        <!-- Name Column -->
        <ng-container matColumnDef="firstName">
          <th mat-header-cell *matHeaderCellDef mat-sort-header> First Name </th>
          <td mat-cell *matCellDef="let element"> {{element.firstName}} </td>
        </ng-container>

        <ng-container matColumnDef="lastName">
          <th mat-header-cell *matHeaderCellDef mat-sort-header> Last Name </th>
          <td mat-cell *matCellDef="let element"> {{element.lastName}} </td>
        </ng-container>
        <ng-container matColumnDef="actions">
          <th *matHeaderCellDef mat-header-cell>Actions</th>
          <td *matCellDef="let element" mat-cell>
            <div class="action-buttons">
              <button
                mat-stroked-button
                color="primary"
                type="button"
                (click)="studentPayments(element)">
                Payments
              </button>

<!--              <button-->
<!--                mat-raised-button-->
<!--                color="accent"-->
<!--                type="button"-->
<!--                (click)="goToEdit(element)">-->
<!--                Edit-->
<!--              </button>-->
            </div>
          </td>
        </ng-container>




        <tr mat-header-row *matHeaderRowDef="displayedColumnsStudent"></tr>
        <tr mat-row *matRowDef="let row; columns: displayedColumnsStudent;"></tr>
      </table>

      <!-- pagination-->
      <mat-paginator [pageSizeOptions]="[5,10,15,30,50,100]"></mat-paginator>
    </mat-card-content>
  </mat-card>
</div>
