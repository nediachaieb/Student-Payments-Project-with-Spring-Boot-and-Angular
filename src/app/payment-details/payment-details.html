<div class="container">
  <div class="header">
    <h1>Détails du Paiement</h1>
  </div>

  <div class="content-card">
    <div *ngIf="loading" class="status-container">
      <p>Chargement du document PDF en cours...</p>
    </div>

    <div *ngIf="!loading && errorMessage" class="status-container error">
      <p>{{ errorMessage }}</p>
    </div>

    <div *ngIf="!loading && !errorMessage && pdfBlobUrl" class="pdf-container">
      <iframe
        [src]="pdfBlobUrl"
        class="pdf-frame">
      </iframe>

      <div class="actions">
        <button type="button" class="btn-action" (click)="openInNewTab()">
          Ouvrir dans un nouvel onglet
        </button>
      </div>
    </div>
  </div>
</div>
