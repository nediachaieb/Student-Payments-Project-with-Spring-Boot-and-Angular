<div class="container">
  <form [formGroup]="paymentFormGroup" class="payment-form-wrapper">
    <mat-card class="payment-form">
      <mat-card-header>
        <mat-card-title>New Payment</mat-card-title>
      </mat-card-header>

      <mat-card-content class="form-content">
        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Payment Date</mat-label>
          <input matInput [matDatepicker]="picker" formControlName="date" />
          <mat-datepicker-toggle matIconSuffix [for]="picker"></mat-datepicker-toggle>
          <mat-datepicker #picker></mat-datepicker>
        </mat-form-field>

        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Amount</mat-label>
          <input matInput type="number" formControlName="amount" />
        </mat-form-field>

        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Payment Type</mat-label>
          <mat-select formControlName="type">
            <mat-option *ngFor="let type of paymentTypes" [value]="type">
              {{ type }}
            </mat-option>
          </mat-select>
        </mat-form-field>

        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Student Code</mat-label>
          <input matInput formControlName="studentCode" />
        </mat-form-field>

        <mat-form-field appearance="outline" class="full-width">
          <mat-label>File</mat-label>
          <button type="button" mat-icon-button matPrefix (click)="fileInput.click()">
            <mat-icon>attach_file</mat-icon>
          </button>
          <input matInput readonly formControlName="fileName" />
          <input
            type="file"
            #fileInput
            accept="application/pdf"
            (change)="selectFile($event)"
            hidden
          />
        </mat-form-field>
      </mat-card-content>

      <mat-card-actions align="end">
        <button
          mat-raised-button
          color="primary"
          type="button"
          (click)="savePayment()"
          [disabled]="paymentFormGroup.invalid"
        >
          Save Payment
        </button>
      </mat-card-actions>
    </mat-card>
  </form>

  <mat-card *ngIf="pdfFileUrl" class="pdf-card">
    <mat-card-header>
      <mat-card-title>Payment File</mat-card-title>
    </mat-card-header>

    <mat-card-content class="pdf-content">
      <iframe
        [src]="pdfFileUrl"
        class="pdf-frame">
      </iframe>
    </mat-card-content>
  </mat-card>
</div>
